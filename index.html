<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Gate Scanner | Executive Access</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
<style>
  :root {
    --bg-base: #000000;
    --bg-surface: #111111;
    --bg-elevated: #1a1a1a;
    --text-primary: #ffffff;
    --text-secondary: #888888;
    --border-subtle: #222222;
    --border-focus: #ffffff;
    --accent: #ffffff;
    --accent-invert: #000000;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
  
  body { 
    background: var(--bg-base); 
    color: var(--text-primary); 
    min-height: 100vh; 
    display: flex; 
    flex-direction: column; 
    overflow: hidden; /* Prevent scrolling on main body for native app feel */
  }

  /* ── Header ── */
  .header { 
    padding: 24px 20px 16px; 
    text-align: center; 
    border-bottom: 1px solid var(--border-subtle);
    background: var(--bg-base);
    z-index: 10;
  }
  .header h1 { font-size: 1.1rem; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; }
  .header p { font-size: 0.75rem; color: var(--text-secondary); margin-top: 4px; letter-spacing: 0.05em; }

  /* ── Scanner Area ── */
  .scanner-wrapper { 
    flex: 1; 
    display: flex; 
    flex-direction: column; 
    justify-content: center; 
    align-items: center; 
    padding: 20px; 
    background: #050505;
  }
  .scanner-container { 
    width: 100%; 
    max-width: 400px; 
    border-radius: 16px; 
    overflow: hidden; 
    border: 1px solid var(--border-subtle);
    background: var(--bg-surface);
  }
  #reader { width: 100%; border: none; }
  #reader__dashboard_section_csr span { color: var(--text-primary) !important; }
  #reader__dashboard_section_swaplink { color: var(--text-secondary) !important; text-decoration: none; }

  /* ── Loading State ── */
  .system-status {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(17, 17, 17, 0.9);
    backdrop-filter: blur(8px);
    padding: 16px 32px;
    border-radius: 30px;
    border: 1px solid var(--border-subtle);
    font-size: 0.85rem;
    font-weight: 500;
    letter-spacing: 0.05em;
    display: none;
    z-index: 50;
  }

  /* ── Mobile Bottom Sheet Modal ── */
  .sheet-overlay { 
    position: fixed; inset: 0; 
    background: rgba(0,0,0,0.6); 
    backdrop-filter: blur(4px);
    z-index: 100; 
    opacity: 0; 
    pointer-events: none; 
    transition: opacity 0.3s ease; 
  }
  .sheet-overlay.active { opacity: 1; pointer-events: all; }
  
  .bottom-sheet { 
    position: absolute; 
    bottom: 0; left: 0; right: 0; 
    background: var(--bg-surface); 
    border-top-left-radius: 24px; 
    border-top-right-radius: 24px; 
    padding: 0 24px 32px; 
    transform: translateY(100%); 
    transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); 
    max-height: 85vh;
    display: flex;
    flex-direction: column;
    box-shadow: 0 -10px 40px rgba(0,0,0,0.5);
  }
  .sheet-overlay.active .bottom-sheet { transform: translateY(0); }

  /* Handle indicator */
  .sheet-handle {
    width: 40px; height: 4px;
    background: var(--border-subtle);
    border-radius: 2px;
    margin: 12px auto 24px;
  }

  /* Modal Content */
  .sheet-header { margin-bottom: 24px; }
  .sheet-title { font-size: 1.25rem; font-weight: 600; letter-spacing: -0.02em; }
  .sheet-subtitle { font-size: 0.8rem; color: var(--text-secondary); margin-top: 4px; font-family: monospace; }
  
  .close-btn { 
    position: absolute; top: 20px; right: 24px; 
    font-size: 1.5rem; font-weight: 300; color: var(--text-secondary); 
    cursor: pointer; padding: 4px; 
  }

  /* Success Banner */
  .success-banner {
    background: var(--accent);
    color: var(--accent-invert);
    padding: 16px;
    border-radius: 12px;
    text-align: center;
    font-weight: 600;
    font-size: 0.9rem;
    letter-spacing: 0.05em;
    margin-bottom: 24px;
    display: none;
  }

  /* Member List */
  .member-list { 
    flex: 1;
    overflow-y: auto; 
    margin-bottom: 24px;
    border-top: 1px solid var(--border-subtle);
  }
  .member-row { 
    display: flex; align-items: center; justify-content: space-between; 
    padding: 16px 0; 
    border-bottom: 1px solid var(--border-subtle);
    transition: opacity 0.2s ease;
  }
  .member-row.checked-in { opacity: 0.4; }
  
  .member-info { display: flex; flex-direction: column; gap: 4px; }
  .member-seat { font-size: 0.95rem; font-weight: 500; }
  .member-status { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em; }
  
  .status-badge.in { color: var(--text-primary); }
  .status-badge.pending { color: var(--text-secondary); }
  
  /* Custom Minimalist Checkbox */
  .custom-checkbox {
    position: relative;
    width: 24px; height: 24px;
  }
  .custom-checkbox input {
    opacity: 0; position: absolute; inset: 0; cursor: pointer; z-index: 2;
  }
  .checkmark {
    position: absolute; inset: 0;
    border: 1px solid var(--text-secondary);
    border-radius: 6px;
    background: transparent;
    transition: all 0.2s ease;
    pointer-events: none;
  }
  .custom-checkbox input:checked ~ .checkmark {
    background: var(--accent);
    border-color: var(--accent);
  }
  .custom-checkbox input:checked ~ .checkmark::after {
    content: ''; position: absolute;
    left: 8px; top: 4px; width: 5px; height: 10px;
    border: solid var(--accent-invert);
    border-width: 0 2px 2px 0;
    transform: rotate(45deg);
  }

  .checked-in-icon { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }

  /* ── Action Buttons ── */
  .action-buttons { display: flex; flex-direction: column; gap: 12px; }
  .btn { 
    width: 100%; padding: 16px; 
    border-radius: 12px; border: none; 
    font-size: 0.9rem; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase;
    cursor: pointer; transition: all 0.2s ease;
  }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
  
  .btn-primary { background: var(--accent); color: var(--accent-invert); }
  .btn-secondary { background: var(--bg-elevated); color: var(--text-primary); border: 1px solid var(--border-subtle); }
</style>
</head>
<body>

<div class="header">
  <h1>Gate Scanner</h1>
  <p>LIONHEART: IRON & ZION</p>
</div>

<div class="scanner-wrapper">
  <div class="scanner-container">
    <div id="reader"></div>
  </div>
</div>

<div class="system-status" id="loading">Authenticating...</div>

<div class="sheet-overlay" id="modalOverlay">
  <div class="bottom-sheet" id="bottomSheet">
    <div class="sheet-handle"></div>
    <div class="close-btn" onclick="closeModal()">✕</div>
    
    <div class="sheet-header">
      <div class="sheet-title" id="m-group-name">Participant Name</div>
      <div class="sheet-subtitle">ID: <span id="m-session-id">---</span></div>
    </div>
    
    <div class="success-banner" id="full-success-banner">
      ALL GUESTS CHECKED IN
    </div>

    <div class="member-list" id="m-member-list">
      </div>
    
    <div class="action-buttons" id="m-actions">
      <button class="btn btn-primary" id="btn-checkin-all" onclick="submitCheckin('all')">Check In All Pending</button>
      <button class="btn btn-secondary" id="btn-checkin-sel" onclick="submitCheckin('selected')" disabled>Check In Selected</button>
    </div>
  </div>
</div>

<script>
  // ==========================================
  // SETUP YOUR GOOGLE SCRIPT URL HERE
  // ==========================================
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzcrzl_SqEydho9UU5_tCm3L6uTvd4Kz1x-J78CGie6YI4atB2PuvVwNQtb2L7NygNOgQ/exec';
  const SECRET = 'RESOUND_ADMIN_2026';
  
  let scanner;
  let currentSessionId = null;
  let pendingMembers = [];

  function startScanner() {
    scanner = new Html5Qrcode("reader");
    scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: { width: 250, height: 250 } }, 
      (decodedText) => {
        scanner.pause();
        handleScan(decodedText);
      },
      (errorMessage) => {}
    ).catch(err => alert("Camera initialization failed. Please ensure permissions are granted."));
  }

  async function handleScan(sessionId) {
    document.getElementById('loading').style.display = 'block';
    try {
      const res = await fetch(`${SCRIPT_URL}?action=get_status&sessionId=${encodeURIComponent(sessionId)}&secret=${SECRET}`);
      const data = await res.json();
      document.getElementById('loading').style.display = 'none';
      
      if (data.success) {
        openModal(data);
      } else {
        alert(data.error);
        scanner.resume();
      }
    } catch (err) {
      document.getElementById('loading').style.display = 'none';
      alert('Connection timeout. Please verify network access.');
      scanner.resume();
    }
  }

  function openModal(data) {
    currentSessionId = data.sessionId;
    document.getElementById('m-group-name').textContent = data.groupName;
    document.getElementById('m-session-id').textContent = data.sessionId;
    
    const list = document.getElementById('m-member-list');
    list.innerHTML = '';
    pendingMembers = [];

    let allCheckedIn = true;

    data.members.forEach(m => {
      const isCheckedIn = m.status === 'Checked In';
      if (!isCheckedIn) {
        allCheckedIn = false;
        pendingMembers.push(m.seat);
      }

      const row = document.createElement('div');
      row.className = `member-row ${isCheckedIn ? 'checked-in' : ''}`;
      
      row.innerHTML = `
        <div class="member-info">
          <div class="member-seat">Ground #${m.seat}</div>
          <div class="member-status status-badge ${isCheckedIn ? 'in' : 'pending'}">${m.status}</div>
        </div>
        ${isCheckedIn 
          ? `<div class="checked-in-icon">✓</div>` 
          : `<label class="custom-checkbox">
               <input type="checkbox" class="seat-cb" value="${m.seat}" onchange="updateBtnState()">
               <span class="checkmark"></span>
             </label>`
        }
      `;
      list.appendChild(row);
    });

    const banner = document.getElementById('full-success-banner');
    const actions = document.getElementById('m-actions');
    
    if (allCheckedIn) {
      banner.style.display = 'block';
      actions.style.display = 'none';
    } else {
      banner.style.display = 'none';
      actions.style.display = 'flex';
      updateBtnState();
    }

    document.getElementById('modalOverlay').classList.add('active');
  }

  function updateBtnState() {
    const checkedBoxes = document.querySelectorAll('.seat-cb:checked');
    document.getElementById('btn-checkin-sel').disabled = checkedBoxes.length === 0;
  }

  async function submitCheckin(mode) {
    let seatsToProcess = [];
    if (mode === 'all') {
      seatsToProcess = pendingMembers;
    } else {
      const checked = document.querySelectorAll('.seat-cb:checked');
      checked.forEach(cb => seatsToProcess.push(cb.value));
    }

    if (seatsToProcess.length === 0) return;

    const btnAll = document.getElementById('btn-checkin-all');
    const btnSel = document.getElementById('btn-checkin-sel');
    btnAll.textContent = 'Processing...'; 
    btnAll.disabled = true;
    btnSel.disabled = true;

    try {
      const seatsQuery = seatsToProcess.join(',');
      const res = await fetch(`${SCRIPT_URL}?action=commit_checkin&sessionId=${currentSessionId}&seats=${seatsQuery}&secret=${SECRET}`);
      const data = await res.json();
      
      if (data.success) {
        handleScan(currentSessionId); 
      } else {
        alert(data.error);
      }
    } catch (err) {
      alert('System error. Please attempt check-in again.');
    } finally {
      btnAll.textContent = 'Check In All Pending';
      btnAll.disabled = false;
    }
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('active');
    if(scanner) {
      setTimeout(() => { scanner.resume(); }, 300); // Wait for animation
    }
  }

  // Close sheet on background tap
  document.getElementById('modalOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  window.onload = startScanner;
</script>
</body>
</html>
